name: CI

# june26.md §1.3 — reliable migration delivery + schema-drift gate + auto-deploy.
#
# PRs and master pushes run two gates:
#   • quality  — typecheck + unit tests + build
#   • database — boot Supabase from scratch (applies EVERY migration in order,
#                so a broken/partial migration like the 0038/0077 incidents
#                fails here, not in prod), then run RLS + integration tests,
#                lint, and a no-drift check.
# Master pushes additionally run:
#   • deploy   — `supabase db push` (transactional prod migration) then
#                `wrangler deploy`. Replaces manual dashboard-paste + laptop deploy.
#
# Required repository secrets for the deploy job (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN   personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF    prod project ref (20-char, from the project URL)
#   SUPABASE_DB_PASSWORD    prod database password
#   CLOUDFLARE_API_TOKEN    token with Workers Scripts:Edit
#   CLOUDFLARE_ACCOUNT_ID   Cloudflare account id
# Until those are set, quality + database still gate every PR; each deploy step
# self-skips when its token is absent rather than half-deploying.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - run: npm ci

      - name: Start Supabase (applies all migrations from scratch)
        run: supabase start

      - name: Lint database (migrations must be clean)
        run: supabase db lint --level warning

      - name: No schema drift (a fresh apply must equal the migrations)
        run: |
          supabase db diff --local --schema public > drift.sql || true
          if [ -s drift.sql ]; then
            echo "::error::Schema drift — the DB built from migrations differs from the migration definitions:"
            cat drift.sql
            exit 1
          fi
          echo "No schema drift."

      - name: RLS + integration tests (against the real local Postgres)
        run: |
          eval "$(supabase status -o env | sed 's/^/export SB_/')"
          export PUBLIC_SUPABASE_URL="$SB_API_URL"
          export PUBLIC_SUPABASE_ANON_KEY="$SB_ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SB_SERVICE_ROLE_KEY"
          npx vitest run integration rls

  # Critical-path e2e (staff review P1.1). Catches the build-passes-but-500s
  # class the outage exposed — unit tests + build can't. Boots the same local
  # Supabase, runs the app dev server, and asserts real pages respond 200
  # (anonymous + authed). Small + blocking: gates deploy without flakiness.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Start Supabase
        run: supabase start
      - name: Run smoke + flow scenarios
        run: |
          eval "$(supabase status -o env | sed 's/^/export SB_/')"
          # The dev server reads server-side secrets via `cloudflare:workers`
          # env, which the Astro dev shim loads from .dev.vars — NOT process.env.
          # So the dev endpoints (test-token/test-exec/test-login) need the
          # service key HERE, not just exported. PUBLIC_* also go in so the
          # cloudflare shim + import.meta.env agree. STRIPE_SECRET_KEY=sk_simulate
          # activates the in-memory Stripe double so money flows run for real.
          cat > .dev.vars <<EOF
          PUBLIC_SUPABASE_URL=$SB_API_URL
          PUBLIC_SUPABASE_ANON_KEY=$SB_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SB_SERVICE_ROLE_KEY
          STRIPE_SECRET_KEY=sk_simulate
          EOF
          export PUBLIC_SUPABASE_URL="$SB_API_URL"
          export PUBLIC_SUPABASE_ANON_KEY="$SB_ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SB_SERVICE_ROLE_KEY"
          npx playwright test ci-smoke.spec.ts scenarios.spec.ts
      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7

  deploy:
    needs: [quality, database, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - run: npm ci

      - name: Push migrations to prod (transactional)
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          # Show what prod is missing vs the repo before applying.
          supabase db diff --linked --schema public || true
          supabase db push

      # PUBLIC_* env is BAKED INTO THE BUNDLE at build time (import.meta.env).
      # These are deliberately inline, not secrets: the Supabase anon key and
      # VAPID public key ship in every browser bundle by design. Without them
      # the build silently bakes `undefined` and every Supabase-touching page
      # 500s in prod (the 2026-06-15 strikketorget.no outage). Locally,
      # .dev.vars / .env.local supply these — but both are gitignored, so CI
      # must set them here.
      - name: Build
        env:
          PUBLIC_SITE_URL: https://www.littlesandmeknits.com
          PUBLIC_SUPABASE_URL: https://cftibmirzakolkcqvqsq.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdGlibWlyemFrb2xrY3F2cXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODI2NzcsImV4cCI6MjA5MzU1ODY3N30.2M8zOgoX3DdqJAXHUxAB0j-2vq6Xyz7M5of21tNfCDc
          PUBLIC_VAPID_KEY: BO5ipC6LSSx-2bQc2mBT9oLNRf90fWSlK_Rd7RYZQ1bQFg-A84n0zb2HHXHAc9kPE8TozL37hEJLYA9DdpAvB1s
        run: npm run build

      # A build that baked the wrong (or no) Supabase URL must never deploy.
      - name: Assert prod env got baked into the bundle
        run: |
          if ! grep -rq "cftibmirzakolkcqvqsq.supabase.co" dist/server/chunks/; then
            echo "::error::Prod PUBLIC_SUPABASE_URL was NOT baked into the server bundle — refusing to deploy."
            exit 1
          fi
          if grep -rq "127.0.0.1:54321" dist/server/chunks/; then
            echo "::error::A localhost Supabase URL leaked into the server bundle — refusing to deploy."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy --config dist/server/wrangler.json

      # Post-deploy smoke: both domains must serve. strikketorget.no/ renders
      # the marketplace (hits Supabase), so it catches env/bake regressions the
      # LMK homepage (static-ish) cannot.
      - name: Smoke-test prod
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: |
          sleep 5
          for url in https://strikketorget.no/ https://www.littlesandmeknits.com/; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
            echo "$code  $url"
            if [ "$code" != "200" ]; then
              echo "::error::$url returned $code after deploy"
              exit 1
            fi
          done
